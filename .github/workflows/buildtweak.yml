name: Build Sparkle tweak for Rootless

on:
    push:
        branches:
            - 'main'
            - 'dev'
    workflow_dispatch:
  
concurrency:
    group: ${{ github.workflow }}-${{ github.ref }}
    cancel-in-progress: true
jobs:
    build:
        name: Build Sparkle Rootless
        runs-on: macos-latest
        permissions:
            contents: write

        steps:
            - name: Checkout Main
              uses: actions/checkout@v4
              with:
                path: main
                submodules: recursive

            - name: Install Dependencies
              run: brew install ldid dpkg make autoconf automake cmake libtool meson nasm ninja pkgconf wget yasm

            - name: Set PATH environment variable
              run: echo "$(brew --prefix make)/libexec/gnubin" >> $GITHUB_PATH 

            - name: Setup Theos
              uses: actions/checkout@v4
              with:
                repository: theos/theos
                # Pinned to a known-good commit. theos master tracks the latest
                # Logos, and commit 777925d (#114) regressed bare %orig parsing
                # (single-line `{ %orig; }`, `%orig]`, etc.). This commit references
                # Logos a623700, the last version that builds this project.
                ref: 405e5c6ddb288615c030eeaedc6b265aae748285
                path: ${{ github.workspace }}/theos
                submodules: recursive
        
            - name: SDK Caching
              id: SDK
              uses: actions/cache@v4
              env:
                cache-name: iPhoneOS16.2.sdk
              with:
                path: ${{ github.workspace }}/theos/sdks/
                key: ${{ env.cache-name }}
                restore-keys: ${{ env.cache-name }}

            - name: Download iOS SDK
              if: steps.SDK.outputs.cache-hit != 'true'
              run: |
                git clone --quiet -n --depth=1 --filter=tree:0 https://github.com/xybp888/iOS-SDKs/
                cd iOS-SDKs
                git sparse-checkout set --no-cone iPhoneOS16.2.sdk
                git checkout
                mv *.sdk $THEOS/sdks
              env:
                THEOS: ${{ github.workspace }}/theos

            - name: Get Sparkle Version
              id: sparkle_version
              run: |
                SPARKLE_VERSION=$(awk '/Version:/ {print $2}' main/control)

                echo "SPARKLE_VERSION=${SPARKLE_VERSION}" >> "$GITHUB_ENV"
                echo "version=${SPARKLE_VERSION}" >> "$GITHUB_OUTPUT"

            - name: Cache FFmpeg frameworks
              id: ffmpeg_cache
              uses: actions/cache@v4
              with:
                path: |
                  main/modules/ffmpegkit
                  main/.cache/ffmpegkit
                key: ffmpegkit-${{ runner.os }}-${{ hashFiles('main/fetch-ffmpegkit.sh') }}

            - name: Prepare FFmpeg frameworks
              run: |
                cd main
                chmod +x ./fetch-ffmpegkit.sh
                ./fetch-ffmpegkit.sh
            
            - name: Build Sparkle tweak for Rootless
              run: |                
                cd main
                ls -la

                ./build.sh rootless
                ls -la packages
                
              env:
                THEOS: ${{ github.workspace }}/theos

            - name: Pass package name to upload action
              id: package_name
              run: |
                # build.sh already names the deb Sparkle_v<version>_rootless.deb
                DEB_FILE="$(basename "$(ls -t main/packages/Sparkle_v*_rootless.deb | head -n1)")"
                echo "package=${DEB_FILE}" >> "$GITHUB_OUTPUT"

            - name: Upload Artifact
              uses: actions/upload-artifact@v4
              with:
                name: ${{ steps.package_name.outputs.package }}
                path: ${{ github.workspace }}/main/packages/${{ steps.package_name.outputs.package }}
                if-no-files-found: error
